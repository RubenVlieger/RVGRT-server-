<!DOCTYPE html>
<html>
<head>
    <title>RVGRT Server Logs</title>
    <style>
        body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; padding: 20px; }
        .log-box { background: #000; padding: 10px; height: 60vh; overflow-y: scroll; border: 1px solid #444; }
        .chat-form { margin-top: 20px; background: #2d2d2d; padding: 15px; border-radius: 5px; border: 1px solid #444; margin-bottom: 20px; }
        input[type="text"] { width: 70%; padding: 8px; font-family: monospace; font-size: 14px; }
        button { padding: 9px 15px; cursor: pointer; background: #0e639c; color: white; border: none; font-weight: bold; font-family: monospace; }
        button:hover { background: #1177bb; }
        .header { display: flex; justify-content: space-between; align-items: center; }
        .logout { color: #f44336; text-decoration: none; font-weight: bold; border: 1px solid #f44336; padding: 5px 10px; border-radius: 3px; }
        .logout:hover { background: #f44336; color: white; }
    </style>
    <script>
        // Auto-scroll log box to bottom
        window.onload = function() {
            var box = document.getElementById("logBox");
            box.scrollTop = box.scrollHeight;
        }
    </script>
</head>
<body>
    <div class="header">
        <h1>RVGRT Game Server Control Panel</h1>
        <div><a class="logout" href="/admin/logout/?next=/">Logout</a></div>
    </div>
    
    <div class="chat-form">
        <h3>Broadcast Message to All Players</h3>
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="message" placeholder="Enter message to broadcast..." required autocomplete="off">
            <button type="submit">Send Broadcast</button>
        </form>
    </div>

    <h3>Recent Server Logs (last 1000 lines, refresh to update)</h3>
    <div class="log-box" id="logBox">
        <pre>{% for line in logs %}{{ line }}{% endfor %}</pre>
    </div>
</body>
</html>
